<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sample — assembler input (LLM-authored, no overlay)</title>
<style>
  /* the LLM's own per-topic design system — the assembler never touches this */
  :root{--paper:#0f1115;--ink:#e9e6df;--accent:#6fd3c7}
  body{margin:0;background:var(--paper);color:var(--ink);font-family:Inter,system-ui,sans-serif}
  .slide{min-height:100vh;display:flex;flex-direction:column;justify-content:center;padding:8vw}
  h1{font-size:clamp(2rem,6vw,4rem);margin:0 0 1rem}
  canvas{border:1px solid #2a2e36;border-radius:12px;background:#161922}
  button{background:var(--accent);border:0;border-radius:8px;padding:10px 16px;font-weight:600;cursor:pointer}
</style>
</head>
<body>
  <!-- deck markup → assembler should detect it and offset the launcher -->
  <section class="slide" data-title="Intro">
    <h1>A bespoke, fully LLM-authored demo</h1>
    <p>The assembler injects only the overlay + validates. This canvas stays exactly as written.</p>
  </section>
  <section class="slide" data-title="Demo">
    <h1>Wiggle</h1>
    <canvas id="wiggle" width="600" height="220" aria-label="A custom animation"></canvas>
    <div><button id="wiggle-go" type="button">Play</button></div>
  </section>
  <script>
    (function(){
      var cv=document.getElementById('wiggle'),ctx=cv.getContext('2d'),t=0,on=true;
      document.getElementById('wiggle-go').onclick=function(){on=!on;if(on)loop();};
      function loop(){if(!on)return;ctx.clearRect(0,0,600,220);ctx.strokeStyle='#6fd3c7';ctx.lineWidth=3;ctx.beginPath();
        for(var x=0;x<600;x++){var y=110+60*Math.sin(x/40+t);x?ctx.lineTo(x,y):ctx.moveTo(x,y);}ctx.stroke();t+=0.06;requestAnimationFrame(loop);}
      loop();
    })();
  </script>
</body>
</html>
